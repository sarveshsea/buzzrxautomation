<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buzzr Tweet Bot</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐝</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    :root {
      --background: #09090b; --foreground: #fafafa; --card: #09090b;
      --muted: #27272a; --muted-foreground: #a1a1aa; --border: #27272a;
      --primary: #fafafa; --primary-foreground: #18181b;
      --accent: #f59e0b; --accent-foreground: #000;
      --destructive: #ef4444; --green: #22c55e; --radius: 0.5rem;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: var(--background); color: var(--foreground); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
    .nav { display: flex; align-items: center; justify-content: space-between; padding-bottom: 2rem; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
    .nav-left { display: flex; align-items: center; gap: 0.75rem; }
    .nav h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.025em; }
    .badge { display: inline-flex; align-items: center; gap: 0.375rem; padding: 0.125rem 0.625rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; border: 1px solid var(--border); }
    .badge .dot { width: 6px; height: 6px; border-radius: 50%; }
    .badge.active .dot { background: var(--green); }
    .badge.error .dot { background: var(--destructive); }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    .card { border: 1px solid var(--border); border-radius: var(--radius); background: var(--card); overflow: hidden; }
    .card-header { padding: 1.25rem 1.5rem 0.75rem; display: flex; justify-content: space-between; align-items: center; }
    .card-title { font-size: 0.875rem; font-weight: 500; color: var(--muted-foreground); }
    .card-content { padding: 0 1.5rem 1.25rem; }
    .card-full { grid-column: 1 / -1; }
    .stat-value { font-size: 2rem; font-weight: 700; letter-spacing: -0.05em; margin-top: 0.25rem; }
    .stat-desc { font-size: 0.8rem; color: var(--muted-foreground); margin-top: 0.125rem; }
    .row { display: flex; justify-content: space-between; align-items: center; padding: 0.625rem 0; border-bottom: 1px solid var(--border); font-size: 0.875rem; }
    .row:last-child { border-bottom: none; }
    .row-label { color: var(--muted-foreground); }
    .row-value { font-weight: 500; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 0.5rem; }
    .status-dot.ok { background: var(--green); }
    .status-dot.warn { background: var(--accent); }
    .status-dot.err { background: var(--destructive); }
    .btn-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.375rem; padding: 0.5rem 1rem; border-radius: var(--radius); font-size: 0.875rem; font-weight: 500; font-family: inherit; cursor: pointer; border: none; transition: all 0.15s; height: 2.25rem; }
    .btn-primary { background: var(--foreground); color: var(--background); }
    .btn-primary:hover { opacity: 0.9; }
    .btn-outline { background: transparent; color: var(--foreground); border: 1px solid var(--border); }
    .btn-outline:hover { background: var(--muted); }
    .btn-accent { background: var(--accent); color: var(--accent-foreground); }
    .btn-accent:hover { opacity: 0.9; }
    .btn-green { background: var(--green); color: #fff; font-weight: 600; }
    .btn-green:hover { opacity: 0.9; }
    .btn-sm { height: 1.75rem; padding: 0.25rem 0.625rem; font-size: 0.75rem; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .console { background: var(--background); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; margin-top: 1rem; font-family: 'SF Mono', 'JetBrains Mono', monospace; font-size: 0.8rem; line-height: 1.6; max-height: 200px; overflow-y: auto; color: var(--muted-foreground); white-space: pre-wrap; }
    .console .success { color: var(--green); }
    .console .error { color: var(--destructive); }
    .console .info { color: var(--accent); }

    /* Headlines table */
    .hl-table { width: 100%; border-collapse: collapse; }
    .hl-table th { text-align: left; font-size: 0.75rem; font-weight: 500; color: var(--muted-foreground); padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.05em; }
    .hl-row { border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
    .hl-row:hover { background: rgba(255,255,255,0.03); }
    .hl-row.selected { background: rgba(245,166,35,0.08); border-left: 2px solid var(--accent); }
    .hl-row td { padding: 0.6rem 0.75rem; font-size: 0.8rem; vertical-align: middle; }
    .hl-source { color: var(--muted-foreground); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.03em; white-space: nowrap; }
    .hl-title { color: var(--foreground); line-height: 1.4; }
    .hl-actions { white-space: nowrap; text-align: right; }

    /* Queue */
    .queue-item { display: flex; align-items: flex-start; gap: 0.75rem; padding: 0.75rem 0; border-bottom: 1px solid var(--border); font-size: 0.8rem; }
    .queue-item:last-child { border-bottom: none; }
    .queue-num { color: var(--muted-foreground); font-weight: 600; min-width: 1.5rem; }
    .queue-text { flex: 1; line-height: 1.5; color: var(--muted-foreground); }
    .queue-badge { font-size: 0.65rem; padding: 0.1rem 0.4rem; border-radius: 4px; font-weight: 500; white-space: nowrap; }
    .queue-badge.template { background: #1e293b; color: #94a3b8; }
    .queue-badge.rss { background: #1a2e1a; color: #4ade80; }
    .queue-empty { color: #52525b; font-size: 0.8rem; padding: 1rem 0; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
    @media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <nav class="nav">
      <div class="nav-left">
        <span style="font-size:1.5rem">🐝</span>
        <h1>Buzzr Tweet Bot</h1>
      </div>
      <span class="badge active" id="statusBadge"><span class="dot"></span><span id="statusText">Loading</span></span>
    </nav>

    <div class="grid">
      <div class="card">
        <div class="card-header"><p class="card-title">Tweet Templates</p></div>
        <div class="card-content">
          <div class="stat-value" id="totalTemplates">—</div>
          <div class="stat-desc">unique tweets loaded</div>
          <div style="margin-top:1rem" id="templateBreakdown"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><p class="card-title">Connections</p></div>
        <div class="card-content" id="credStatus"><div class="row"><span class="row-label">Loading...</span></div></div>
      </div>
      <div class="card">
        <div class="card-header"><p class="card-title">Schedule</p></div>
        <div class="card-content" id="configInfo"><div class="row"><span class="row-label">Loading...</span></div></div>
      </div>
    </div>

    <!-- Controls -->
    <div class="card card-full" style="margin-bottom:1.5rem">
      <div class="card-header"><p class="card-title">Controls</p></div>
      <div class="card-content">
        <div class="btn-group">
          <button class="btn btn-primary" id="btnPost" onclick="triggerPost()">Post Template</button>
          <button class="btn btn-green" id="btnReact" onclick="triggerReact()">Post from RSS + AI</button>
          <button class="btn btn-accent btn-sm" id="btnPostSelected" onclick="postSelected()" style="display:none">Post Selected Headline</button>
          <button class="btn btn-outline" onclick="loadStatus()">Refresh</button>
        </div>
        <div class="console" id="actionLog"><span class="info">$</span> ready</div>
      </div>
    </div>

    <div class="two-col">
      <!-- Headlines -->
      <div class="card">
        <div class="card-header">
          <p class="card-title">Sports Headlines</p>
          <span style="font-size:0.7rem;color:var(--muted-foreground)" id="hlCount"></span>
        </div>
        <div class="card-content">
          <div style="overflow-x:auto">
            <table class="hl-table">
              <thead><tr><th>Source</th><th>Headline</th><th></th></tr></thead>
              <tbody id="hlBody"><tr><td colspan="3" style="color:#52525b;padding:1rem 0.75rem;font-size:0.8rem">Scanning feeds...</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Queue -->
      <div class="card">
        <div class="card-header">
          <p class="card-title">Tweet Queue</p>
          <button class="btn btn-outline btn-sm" onclick="clearQueue()">Clear</button>
        </div>
        <div class="card-content" id="queueList">
          <div class="queue-empty">Queue is empty. Add headlines or templates.</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const log = document.getElementById('actionLog');
    let selectedHeadline = null;
    let allHeadlines = [];
    let queue = [];

    function appendLog(msg, cls = '') {
      const s = document.createElement('span');
      s.className = cls;
      s.textContent = msg + '\n';
      log.appendChild(s);
      log.scrollTop = log.scrollHeight;
    }

    function renderQueue() {
      const el = document.getElementById('queueList');
      if (queue.length === 0) {
        el.innerHTML = '<div class="queue-empty">Queue is empty. Click headlines to add them.</div>';
        return;
      }
      el.innerHTML = queue.map((item, i) => `
        <div class="queue-item">
          <span class="queue-num">${i + 1}</span>
          <span class="queue-text">${item.text}</span>
          <span class="queue-badge ${item.type}">${item.type === 'rss' ? 'RSS' : 'Template'}</span>
          <button class="btn btn-outline btn-sm" onclick="removeFromQueue(${i})" style="margin-left:0.5rem">x</button>
        </div>
      `).join('');
    }

    function addToQueue(headline) {
      queue.push({ text: headline, type: 'rss' });
      renderQueue();
    }

    function removeFromQueue(i) {
      queue.splice(i, 1);
      renderQueue();
    }

    function clearQueue() {
      queue = [];
      renderQueue();
    }

    function selectHeadline(idx) {
      selectedHeadline = allHeadlines[idx];
      document.querySelectorAll('.hl-row').forEach((r, i) => r.classList.toggle('selected', i === idx));
      document.getElementById('btnPostSelected').style.display = 'inline-flex';
    }

    async function postSelected() {
      if (!selectedHeadline) return;
      const btn = document.getElementById('btnPostSelected');
      btn.disabled = true;
      appendLog('$ generating AI tweet for: ' + selectedHeadline, 'info');
      try {
        const res = await fetch('/api/react');
        const data = await res.json();
        if (data.success !== false) {
          appendLog('Posted!', 'success');
          appendLog(data.tweet || data.message || 'Done');
        } else {
          appendLog('Failed: ' + (data.error || 'unknown'), 'error');
        }
      } catch (e) {
        appendLog('Error: ' + e.message, 'error');
      }
      btn.disabled = false;
    }

    function renderHeadlines(headlines) {
      allHeadlines = headlines;
      const body = document.getElementById('hlBody');
      document.getElementById('hlCount').textContent = headlines.length + ' articles';
      if (!headlines.length) {
        body.innerHTML = '<tr><td colspan="3" style="color:#52525b;padding:1rem 0.75rem;font-size:0.8rem">No headlines found</td></tr>';
        return;
      }
      body.innerHTML = headlines.map((h, i) => {
        const source = typeof h === 'object' ? (h.source || '').replace('espn_', 'ESPN ').replace('bleacher_report', 'B/R') : '';
        const title = typeof h === 'object' ? h.title : h;
        return `<tr class="hl-row" onclick="selectHeadline(${i})">
          <td><span class="hl-source">${source}</span></td>
          <td class="hl-title">${title}</td>
          <td class="hl-actions"><button class="btn btn-outline btn-sm" onclick="event.stopPropagation();addToQueue('${title.replace(/'/g, "\\'")}')">+ Queue</button></td>
        </tr>`;
      }).join('');
    }

    async function loadStatus() {
      try {
        const res = await fetch('/api/status');
        const data = await res.json();
        const badge = document.getElementById('statusBadge');
        const statusText = document.getElementById('statusText');
        badge.className = data.status === 'active' ? 'badge active' : 'badge error';
        statusText.textContent = data.status === 'active' ? 'Active' : 'Setup needed';

        document.getElementById('totalTemplates').textContent = data.total_templates || '—';
        const bd = document.getElementById('templateBreakdown');
        if (data.templates) bd.innerHTML = Object.entries(data.templates).map(([k,v]) => `<div class="row"><span class="row-label">${k}</span><span class="row-value">${v}</span></div>`).join('');

        const creds = document.getElementById('credStatus');
        if (data.credentials) creds.innerHTML = `
          <div class="row"><span class="row-label"><span class="status-dot ${data.credentials.twitter?'ok':'err'}"></span>Twitter/X</span><span class="row-value">${data.credentials.twitter?'Connected':'Missing'}</span></div>
          <div class="row"><span class="row-label"><span class="status-dot ${data.credentials.openrouter?'ok':'warn'}"></span>OpenRouter AI</span><span class="row-value">${data.credentials.openrouter?'Connected':'Optional'}</span></div>`;

        const cfg = document.getElementById('configInfo');
        if (data.config) cfg.innerHTML = `
          <div class="row"><span class="row-label">Frequency</span><span class="row-value">Every hour</span></div>
          <div class="row"><span class="row-label">Active hours</span><span class="row-value">${data.config.active_hours.start}:00–${data.config.active_hours.end}:00</span></div>
          <div class="row"><span class="row-label">Media attach</span><span class="row-value">${Math.round(data.config.media_chance*100)}%</span></div>`;

        if (data.headlines_full && data.headlines_full.length > 0) {
          renderHeadlines(data.headlines_full);
        } else if (data.headlines && data.headlines.length > 0) {
          renderHeadlines(data.headlines.map(h => ({title: h, source: ''})));
        } else {
          renderHeadlines([]);
        }
      } catch (e) {
        document.getElementById('statusBadge').className = 'badge error';
        document.getElementById('statusText').textContent = 'Offline';
      }
    }

    async function triggerPost() {
      const btn = document.getElementById('btnPost');
      btn.disabled = true;
      appendLog('$ posting template tweet...', 'info');
      try {
        const res = await fetch('/api/post');
        const data = await res.json();
        if (data.success) { appendLog('Posted!', 'success'); appendLog(data.tweet); }
        else appendLog('Failed: ' + (data.error || 'unknown'), 'error');
      } catch (e) { appendLog('Error: ' + e.message, 'error'); }
      btn.disabled = false;
    }

    async function triggerReact() {
      const btn = document.getElementById('btnReact');
      btn.disabled = true;
      appendLog('$ scanning RSS + generating AI tweet...', 'info');
      try {
        const res = await fetch('/api/post-now');
        const data = await res.json();
        if (data.success) {
          appendLog('Posted!', 'success');
          if (data.headline) appendLog('Re: ' + data.headline, 'info');
          appendLog('Source: ' + (data.source === 'ai_rss' ? 'AI + RSS' : 'Template fallback'), 'info');
          appendLog(data.tweet);
        } else appendLog('Failed: ' + (data.error || 'unknown'), 'error');
      } catch (e) { appendLog('Error: ' + e.message, 'error'); }
      btn.disabled = false;
    }

    loadStatus();
  </script>
</body>
</html>
